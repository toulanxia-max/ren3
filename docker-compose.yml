version: '3.8'

services:
  # MySQL数据库服务
  mysql:
    image: mysql:8.0
    container_name: ninja-clan-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: ninja_clan_db
      MYSQL_USER: ninja_user
      MYSQL_PASSWORD: ninja_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - ninja-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Redis缓存服务
  redis:
    image: redis:7-alpine
    container_name: ninja-clan-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ninja-network
    command: redis-server --appendonly yes

  # 后端API服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ninja-clan-backend
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - NODE_ENV=production
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=ninja_clan_db
      - DB_USER=ninja_user
      - DB_PASSWORD=ninja_password
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=your_jwt_secret_key_change_in_production
      - PORT=3001
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - uploads_data:/app/uploads
    networks:
      - ninja-network
    restart: unless-stopped

  # 前端应用服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ninja-clan-frontend
    depends_on:
      - backend
    environment:
      - REACT_APP_API_URL=http://localhost:3001
      - REACT_APP_WS_URL=ws://localhost:3001
    ports:
      - "3000:80"
    networks:
      - ninja-network
    restart: unless-stopped

  # Nginx反向代理 (生产环境)
  nginx:
    image: nginx:alpine
    container_name: ninja-clan-nginx
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
      - ./nginx/logs:/var/log/nginx
    networks:
      - ninja-network
    restart: unless-stopped

  # Adminer数据库管理 (开发用)
  adminer:
    image: adminer
    container_name: ninja-clan-adminer
    depends_on:
      - mysql
    ports:
      - "8080:8080"
    networks:
      - ninja-network
    restart: unless-stopped

  # 监控服务 (可选)
  prometheus:
    image: prom/prometheus
    container_name: ninja-clan-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - ninja-network
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'

  grafana:
    image: grafana/grafana
    container_name: ninja-clan-grafana
    ports:
      - "3002:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    networks:
      - ninja-network
    depends_on:
      - prometheus

volumes:
  mysql_data:
  redis_data:
  uploads_data:
  prometheus_data:
  grafana_data:

networks:
  ninja-network:
    driver: bridge